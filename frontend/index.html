<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="./src/assets/logo.png" />
  <link rel="apple-touch-icon" href="/icons/pwa-192x192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#EAB000" />
  <meta name="description" content="FinTrack — track your income, expenses, bills, and savings plans in one place." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="FinTrack" />
  <title>FinTrack</title>
  <script>
    // TEMPORARY MOBILE DEBUG TOOL — remove once the blank-screen issue is
    // resolved. Loads an in-page console (Eruda) only when the page is
    // visited with ?debug=1 in the URL, so it never loads for normal users.
    window.addEventListener('load', function () {
      if (location.search.includes('debug=1')) {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/eruda';
        document.body.appendChild(s);
        s.onload = function () {
          window.eruda && window.eruda.init();
        };
      }
    });
  </script>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
